name: CI/CD Pipeline for Virtual Assistant

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'VirtualAssistant.sln'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
      
      - name: Build with analyzers
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release --no-incremental
      
      - name: Run unit tests
        run: dotnet test VirtualAssistant.Tests.Unit/VirtualAssistant.Tests.Unit.csproj --configuration Release --no-build --logger "trx"
      
      - name: Run integration tests
        run: dotnet test VirtualAssistant.Tests.Integration/VirtualAssistant.Tests.Integration.csproj --configuration Release --no-build --logger "trx"
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            **/bin/Release/**/*.xml
          retention-days: 7