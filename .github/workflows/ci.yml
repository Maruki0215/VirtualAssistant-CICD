# Имя workflow (отображается в GitHub Actions)
name: CI/CD Pipeline for Virtual Assistant

# Триггеры: когда запускать пайплайн
on:
  # Запуск при push в любую ветку
  push:
    branches: [ "main", "develop", "feature/*" ]
  
  # Запуск при создании/обновлении Pull Request
  pull_request:
    branches: [ "main" ]
  
  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:

# Глобальные переменные окружения
env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'VirtualAssistant.sln'
  COVERAGE_THRESHOLD: 70

# Джобы (jobs) выполняются последовательно (если не указано иное)
jobs:
  # ==================== СТАДИЯ 1: TEST ====================
  # Стадия тестирования - проверка качества кода
  
  lint:
    name: Линтинг и статический анализ
    runs-on: ubuntu-latest  # Используем Ubuntu для выполнения
    
    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Установка .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      # Шаг 3: Восстановление зависимостей
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
      
      # Шаг 4: Запуск StyleCop и SonarAnalyzer через сборку
      - name: Run static analysis (StyleCop + SonarAnalyzer)
        run: |
          dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release
        continue-on-error: false  # Останавливаем пайплайн при ошибках
      
      # Шаг 5: Сохранение отчета об анализе (если есть)
      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-report
          path: |
            **/bin/Release/**/*.xml
            **/bin/Release/**/*.json
          retention-days: 7

  unit-tests:
    name: Модульные тесты
    runs-on: ubuntu-latest
    needs: lint  # Ждем завершения lint перед запуском
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
      
      - name: Build project
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release
      
      # Запуск модульных тестов с генерацией отчета в формате JUnit
      - name: Run unit tests
        run: |
          dotnet test VirtualAssistant.Tests.Unit/VirtualAssistant.Tests.Unit.csproj \
            --configuration Release \
            --no-build \
            --logger "junit;LogFilePath=unit-test-results.xml" \
            --results-directory ./TestResults
      
      # Сохранение результатов тестов как артефакт
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/unit-test-results.xml
          retention-days: 7
      
      # Публикация результатов тестов в интерфейсе GitHub
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests Results
          path: ./TestResults/unit-test-results.xml
          reporter: java-junit
          fail-on-error: false

  # ==================== СТАДИЯ 2: INTEGRATION ====================
  
  integration-tests:
    name: Интеграционные тесты
    runs-on: ubuntu-latest
    needs: unit-tests  # Ждем завершения unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
      
      - name: Build project
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release
      
      # Запуск интеграционных тестов
      - name: Run integration tests
        run: |
          dotnet test VirtualAssistant.Tests.Integration/VirtualAssistant.Tests.Integration.csproj \
            --configuration Release \
            --no-build \
            --logger "junit;LogFilePath=integration-test-results.xml" \
            --results-directory ./TestResults
      
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./TestResults/integration-test-results.xml
          retention-days: 7
      
      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests Results
          path: ./TestResults/integration-test-results.xml
          reporter: java-junit
          fail-on-error: false

  # ==================== СТАДИЯ 3: REPORT ====================
  
  coverage:
    name: Анализ покрытия кода
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
      
      # Установка Coverlet для измерения покрытия
      - name: Install Coverlet
        run: dotnet tool install --global coverlet.console
      
      # Запуск тестов с измерением покрытия
      - name: Run tests with coverage
        run: |
          dotnet test VirtualAssistant.Tests.Unit/VirtualAssistant.Tests.Unit.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./CoverageResults \
            --settings coverlet.runsettings
      
      # Генерация отчета о покрытии в формате Cobertura
      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:./CoverageResults/**/coverage.cobertura.xml \
            -targetdir:./CoverageReport \
            -reporttypes:Html;HtmlSummary;Cobertura
      
      # Проверка порога покрытия (не менее 70%)
      - name: Check coverage threshold
        run: |
          COVERAGE=$(dotnet test VirtualAssistant.Tests.Unit/VirtualAssistant.Tests.Unit.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./CoverageResults \
            --settings coverlet.runsettings \
            --filter "FullyQualifiedName~PasswordPolicyTests" \
            | grep -oP 'Total \|\s+\K[0-9.]+(?=%)' || echo "0")
          
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          else
            echo "Coverage ${COVERAGE}% meets threshold ${{ env.COVERAGE_THRESHOLD }}%"
          fi
        continue-on-error: false
      
      # Сохранение отчета о покрытии
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport/
          retention-days: 14
      
      # Сохранение raw данных покрытия
      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: ./CoverageResults/
          retention-days: 7

  publish-reports:
    name: Публикация отчетов
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, coverage]
    if: always()  # Всегда выполнять, даже если предыдущие упали
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Скачивание всех артефактов
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
      
      # Создание итогового отчета
      - name: Create summary report
        run: |
          mkdir -p ./final-report
          echo "# CI/CD Pipeline Report" > ./final-report/index.md
          echo "" >> ./final-report/index.md
          echo "## Execution Summary" >> ./final-report/index.md
          echo "" >> ./final-report/index.md
          echo "| Stage | Status | Time |" >> ./final-report/index.md
          echo "|-------|--------|------|" >> ./final-report/index.md
          echo "| Lint | ${{ job.status }} | $(date) |" >> ./final-report/index.md
          echo "| Unit Tests | ${{ needs.unit-tests.result }} | - |" >> ./final-report/index.md
          echo "| Integration Tests | ${{ needs.integration-tests.result }} | - |" >> ./final-report/index.md
          echo "| Coverage | ${{ needs.coverage.result }} | - |" >> ./final-report/index.md
          echo "" >> ./final-report/index.md
          echo "## Coverage Report" >> ./final-report/index.md
          echo "" >> ./final-report/index.md
          echo "Coverage report is available in the artifacts." >> ./final-report/index.md
      
      # Сохранение итогового отчета
      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: ./final-report/
          retention-days: 30